<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div Style</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <div class="row-1">Welcome to My Site</div>
        <div class="row-2">
            <div class="row-2-col1">Home</div>
            <div class="row-2-col2">About</div>
            <div class="row-2-col3">Courses</div>
            <div class="row-2-col4">Gallery</div>
            <div class="row-2-col5">Contact Us</div>
        </div>
        <div class="row-3">
            <div class="row-3-col1">
                <div class="row-3-row1">Home</div>
                <div class="row-3-row2">About</div>
                <div class="row-3-row3">Courses</div>
                <div class="row-3-row4">Gallery</div>
                <div class="row-3-row5">Contact Us</div>
            </div>
            <div class="row-3-col2">
                <img src="images.jpg" alt="image" width="750px" height="200px">
            </div>
        </div>
        <div class="row-4">
            Ankush Maurya
        </div>
        <div class="row-5">
            <div class="row-5-col1">Image 1</div>
            <div class="row-5-col2">Image 2</div>
            <div class="row-5-col3">Image 3</div>
        </div>
        <div class="row-6">
            Home | About | Courses | Gallery | Contact Us
        </div>
    </div>
</body>
</html>
